<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR za venčanje</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: radial-gradient(circle at top, #2a2331 0%, #161217 52%, #0d0b10 100%);
            color: #f2ece7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .print-card {
            width: 100%;
            max-width: 760px;
            text-align: center;
            background: rgba(24, 20, 28, 0.94);
            border-radius: 24px;
            padding: 44px 34px 38px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
            border: 1px solid rgba(212, 175, 159, 0.14);
        }

        .message {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.15rem;
            line-height: 1.45;
            font-weight: 700;
            color: #f3d6c7;
            margin-bottom: 26px;
            letter-spacing: 0.2px;
        }

        .qr-frame {
            display: inline-block;
            padding: 18px;
            border: 1px solid rgba(243, 214, 199, 0.18);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
        }

        .qr-frame img {
            display: block;
            width: 420px;
            height: 420px;
            max-width: 80vw;
            max-height: 80vw;
        }

        .subtitle {
            margin-top: 20px;
            font-size: 1rem;
            color: #c2b8b3;
            font-weight: 300;
        }

        @media print {
            body {
                min-height: auto;
                padding: 0;
                background: white;
                color: black;
            }

            .print-card {
                max-width: none;
                box-shadow: none;
                border: none;
                background: white;
                padding: 0;
            }

            .message {
                color: black;
            }

            .subtitle {
                color: #444;
            }
        }

        @media (max-width: 768px) {
            .print-card {
                padding: 34px 22px 30px;
            }

            .message {
                font-size: 1.8rem;
            }

            .qr-frame img {
                width: 340px;
                height: 340px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .print-card {
                padding: 26px 16px 22px;
                border-radius: 20px;
            }

            .message {
                font-size: 1.55rem;
            }

            .qr-frame {
                padding: 14px;
            }

            .qr-frame img {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <main class="print-card">
        <div class="message">Dobrodosli na nase vencanje. Skenirajte QR kod kako bi uploadovali vase slike u nas album</div>
        <div class="qr-frame">
            <img id="qrCode" src="" alt="QR kod za otpremanje fotografija" />
        </div>
        <div class="subtitle">QR kod vodi direktno na upload stranicu.</div>
    </main>

    <script>
        let siteUrl = window.location.origin.replace(/\/$/, '');

        async function loadRuntimeConfig() {
            try {
                const response = await fetch('/api/config');
                if (!response.ok) {
                    return;
                }

                const config = await response.json();
                if (config.siteUrl) {
                    siteUrl = config.siteUrl.replace(/\/$/, '');
                }
            } catch (error) {
                siteUrl = window.location.origin.replace(/\/$/, '');
            }
        }

        function generateQRCode() {
            const qrUrl = `${siteUrl}/`;
            const encodedUrl = encodeURIComponent(qrUrl);
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=420x420&data=${encodedUrl}`;
            document.getElementById('qrCode').src = qrApiUrl;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadRuntimeConfig();
            generateQRCode();
        });
    </script>
</body>
</html>
