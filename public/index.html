<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaviša i Ana - Fotografije sa venčanja</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <!-- ===== Hero Section ===== -->
        <div class="hero">
            <h1>Slaviša <span class="ring">💍</span> Ana</h1>
            <div class="date">23. Maj 2025</div>
            <p>Podelite sa nama svoje najlepše trenutke</p>
        </div>

        <!-- ===== Messages ===== -->
        <div class="error-message" id="errorMessage"></div>
        <div class="info-message" id="infoMessage"></div>

        <!-- ===== Upload Section ===== -->
        <div class="upload-section" id="uploadSection">
            <h2>📸 Otpremite svoje fotografije</h2>

            <!-- Upload Zone -->
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('uploadInput').click()">
                <span class="upload-zone-icon">📷</span>
                <div class="upload-zone-text">
                    <h3>Kliknite ili prevucite fotografije ovde</h3>
                    <p>JPG, PNG, WEBP, HEIC, HEIF do 20 MB po fajlu</p>
                </div>
            </div>

            <!-- File Input -->
            <input type="file" id="uploadInput" class="upload-input" accept="image/*" multiple />

            <!-- File List -->
            <div class="file-list" id="fileList"></div>

            <!-- Progress Bar -->
            <div class="upload-progress" id="uploadProgress"></div>

            <!-- Buttons -->
            <div class="button-group">
                <button class="btn btn-secondary" id="clearBtn" onclick="clearFiles()">Obriši sve</button>
                <button class="btn btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled>Otpremi u album</button>
            </div>
        </div>

        <!-- ===== Success Screen ===== -->
        <div class="success-screen" id="successScreen">
            <div class="success-icon">✨</div>
            <h2>Hvala vam!</h2>
            <p>Vaše fotografije su uspešno otpremljene u naš album sa venčanja!</p>
            <div class="button-group">
                <button class="btn btn-primary" onclick="resetForMore()">Otpremite još fotografija</button>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
